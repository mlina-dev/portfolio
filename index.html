<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melchard Lina</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- header -->
    <header>
      <h1 class="dev_name"><a href="#landing">Melchard Lina</a></h1>
      <nav class="navbar">
        <ul>
          <li><a id="about_nav" class="navigation" href="#about">About</a></li>
          <li>
            <a id="skills_nav" class="navigation" href="#skills">Skills</a>
          </li>
          <li>
            <a id="projects_nav" class="navigation" href="#projects"
              >Projects</a
            >
          </li>
          <li>
            <a id="contact_nav" class="navigation" href="#contact">Contact</a>
          </li>
        </ul>
      </nav>
    </header>
    <!-- contents -->
    <main>
      <!-- landing page -->
      <section class="landing_page" id="landing">
        <div class="home_content_wrapper">
          <div class="avatar_wrapper">
            <img src="/assets/images/profile.png" alt="Avatar" />
          </div>
          <div class="intro_wrapper">
            <h1 class="full_name">Melchard Lina</h1>
            <h3 class="tagline">
              Full-Stack Web Developer | Creating Tools That Make Everyday Work
              Effortless
            </h3>
            <button class="download_resume">Download Resume</button>
          </div>
        </div>
      </section>
      <!-- about -->
      <section class="about_section" id="about">
        <h2 class="title">About</h2>
      </section>
      <!-- skill -->
      <section class="skill_section" id="skills">
        <h2 class="title">Skills</h2>
      </section>
      <!-- project -->
      <section class="project_section" id="projects">
        <h2 class="title">Projects</h2>
      </section>
      <!-- contact -->
      <section class="contact_section" id="contact">
        <h2 class="title">Contact</h2>
      </section>
    </main>
    <!-- footer -->
    <script src="script.js"></script>
  </body>
</html>
